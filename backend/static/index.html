<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对冲套利分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }
  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  header h1 { font-size: 24px; font-weight: 600; letter-spacing: 2px; }
  header p { font-size: 13px; color: #a0aec0; margin-top: 4px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  /* ── Input Form ── */
  .input-section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .input-section h2 { font-size: 16px; color: #1a1a2e; margin-bottom: 16px; border-left: 4px solid #4a6cf7; padding-left: 10px; }
  .form-row { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-end; }
  .contract-group { flex: 1; min-width: 280px; background: #f8f9fc; border-radius: 8px; padding: 16px; border: 1px solid #e8ecf1; }
  .contract-group h3 { font-size: 14px; color: #4a6cf7; margin-bottom: 12px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 8px 12px; border: 1px solid #d9dce6; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; outline: none; }
  .field input:focus, .field select:focus { border-color: #4a6cf7; box-shadow: 0 0 0 2px rgba(74,108,247,0.1); }
  .field input[type="number"] { width: 100px; }
  .code-help { font-weight: 400; }
  .code-help a { color: #4a6cf7; text-decoration: none; font-size: 11px; }
  .code-help a:hover { text-decoration: underline; }
  .btn-group { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  #analyzeBtn { background: linear-gradient(135deg, #4a6cf7, #6366f1); color: #fff; border: none; padding: 10px 32px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
  #analyzeBtn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,108,247,0.35); }
  #analyzeBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .warning { color: #e67e22; font-size: 13px; display: none; align-items: center; gap: 4px; }
  .warning.show { display: flex; }
  .spinner { display: none; width: 20px; height: 20px; border: 3px solid #e8ecf1; border-top-color: #4a6cf7; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .spinner.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { display: none; background: #fff5f5; color: #e53e3e; border: 1px solid #fed7d7; border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 13px; }
  .error-msg.show { display: block; }

  /* ── Results ── */
  #results { display: none; }
  #results.show { display: block; }
  .card { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 16px; color: #1a1a2e; margin-bottom: 14px; border-left: 4px solid #4a6cf7; padding-left: 10px; }
  .card h3 { font-size: 14px; color: #555; margin: 12px 0 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
  table th { background: #f0f2f8; color: #444; font-weight: 600; text-align: left; padding: 8px 12px; border-bottom: 2px solid #d9dce6; }
  table td { padding: 7px 12px; border-bottom: 1px solid #eee; }
  table tr:hover td { background: #f8f9fc; }
  .val-pos { color: #e53e3e; }
  .val-neg { color: #38a169; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .info-item { font-size: 13px; }
  .info-item .label { color: #888; }
  .info-item .value { font-weight: 600; color: #333; }

  /* ── Charts ── */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .chart-card h3 { font-size: 14px; color: #1a1a2e; margin-bottom: 8px; text-align: center; }
  .chart-box { width: 100%; height: 360px; }

  @media (max-width: 900px) {
    .form-row { flex-direction: column; }
    .charts-grid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>📊 对冲套利分析</h1>
  <p>输入两个合约代码，获取多维度对比分析报告与交互式图表</p>
</header>

<div class="container">
  <!-- ════════ 9.1 输入表单区域 ════════ -->
  <div class="input-section">
    <h2>合约输入</h2>
    <div class="form-row">
      <div class="contract-group">
        <h3>合约 A</h3>
        <div class="field">
          <label>合约代码 <span class="code-help" id="helpA"></span></label>
          <input type="text" id="codeA" placeholder="如 159985" oninput="validateForm()">
        </div>
        <div class="field">
          <label>合约类型</label>
          <select id="typeA" onchange="validateForm(); updateHelp('A')">
            <option value="ETF">ETF</option>
            <option value="期货主力连续">期货主力连续</option>
            <option value="A股股票">A股股票</option>
            <option value="美股">美股</option>
            <option value="港股">港股</option>
          </select>
        </div>
        <div class="field">
          <label>价格权重</label>
          <input type="number" id="weightA" value="1.0" step="0.1" min="0.01">
        </div>
      </div>
      <div class="contract-group">
        <h3>合约 B</h3>
        <div class="field">
          <label>合约代码 <span class="code-help" id="helpB"></span></label>
          <input type="text" id="codeB" placeholder="如 M0" oninput="validateForm()">
        </div>
        <div class="field">
          <label>合约类型</label>
          <select id="typeB" onchange="validateForm(); updateHelp('B')">
            <option value="ETF">ETF</option>
            <option value="期货主力连续" selected>期货主力连续</option>
            <option value="A股股票">A股股票</option>
            <option value="美股">美股</option>
            <option value="港股">港股</option>
          </select>
        </div>
        <div class="field">
          <label>价格权重</label>
          <input type="number" id="weightB" value="1.0" step="0.1" min="0.01">
        </div>
      </div>
    </div>
    <div class="btn-group" style="display:flex;align-items:center;gap:16px;margin-top:16px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:13px;color:#666;white-space:nowrap;margin:0;">时间窗口</label>
        <select id="yearsSelect" style="padding:9px 12px;border:1px solid #d9dce6;border-radius:6px;font-size:14px;outline:none;">
          <option value="1">近1年</option>
          <option value="2">近2年</option>
          <option value="3" selected>近3年</option>
          <option value="5">近5年</option>
        </select>
      </div>
      <button id="analyzeBtn" disabled onclick="runAnalysis()">分析</button>
      <div class="spinner" id="spinner"></div>
      <span class="warning" id="dupWarning">⚠️ 两个合约代码和类型完全相同，请输入不同的合约</span>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- ════════ 9.3 & 9.4 结果区域 ════════ -->
  <div id="results">
    <!-- 基本行情 -->
    <div class="card" id="basicInfoCard"></div>
    <!-- 年度收益 -->
    <div class="card" id="annualReturnCard"></div>
    <!-- 波动率 -->
    <div class="card" id="volatilityCard"></div>
    <!-- 最大回撤 -->
    <div class="card" id="drawdownCard"></div>
    <!-- 相关性 -->
    <div class="card" id="correlationCard"></div>
    <!-- 趋势 -->
    <div class="card" id="trendCard"></div>
    <!-- 成交量趋势 -->
    <div class="card" id="volumeTrendCard"></div>
    <!-- 价比价差 -->
    <div class="card" id="ratioSpreadCard"></div>
    <!-- 月度收益 -->
    <div class="card" id="monthlyReturnCard"></div>

    <!-- ════════ 9.4 图表区域 ════════ -->
    <div class="charts-grid">
      <div class="chart-card"><h3>合约A 价格走势</h3><div class="chart-box" id="chartPriceA"></div></div>
      <div class="chart-card"><h3>合约B 价格走势</h3><div class="chart-box" id="chartPriceB"></div></div>
      <div class="chart-card"><h3>价比走势</h3><div class="chart-box" id="chartRatio"></div></div>
      <div class="chart-card"><h3>价差走势</h3><div class="chart-box" id="chartSpread"></div></div>
      <div class="chart-card"><h3>归一化价格对比 (基准=100)</h3><div class="chart-box" id="chartNorm"></div></div>
      <div class="chart-card"><h3>60日滚动相关性</h3><div class="chart-box" id="chartCorr"></div></div>
      <div class="chart-card"><h3>月度收益对比</h3><div class="chart-box" id="chartMonthly"></div></div>
      <div class="chart-card"><h3>月度收益率分布</h3><div class="chart-box" id="chartDist"></div></div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════
   9.1  Input validation
   ════════════════════════════════════════════════ */
function validateForm() {
  const codeA = document.getElementById('codeA').value.trim();
  const codeB = document.getElementById('codeB').value.trim();
  const typeA = document.getElementById('typeA').value;
  const typeB = document.getElementById('typeB').value;
  const btn   = document.getElementById('analyzeBtn');
  const warn  = document.getElementById('dupWarning');

  const bothFilled = codeA !== '' && codeB !== '';
  const isDup = bothFilled && codeA === codeB && typeA === typeB;

  btn.disabled = !bothFilled || isDup;
  warn.classList.toggle('show', isDup);
}

/* 合约类型 → AKShare 文档链接 & 代码格式提示 */
const _HELP_MAP = {
  'ETF':       { url: 'https://akshare.akfamily.xyz/data/fund/fund_public.html#id20', example: '如 159985、510300', doc: '查看ETF代码' },
  '期货主力连续': { url: 'https://akshare.akfamily.xyz/data/futures/futures.html#id26', example: '如 M0、V0、IF0', doc: '查看期货代码' },
  'A股股票':    { url: 'https://akshare.akfamily.xyz/data/stock/stock.html#id8',       example: '如 600519、000001', doc: '查看A股代码' },
  '美股':       { url: 'https://akshare.akfamily.xyz/data/stock/stock.html#id65',      example: '如 105.AAPL、106.TTE', doc: '查看美股代码' },
  '港股':       { url: 'https://akshare.akfamily.xyz/data/stock/stock.html#id42',      example: '如 00593、09988', doc: '查看港股代码' },
};

function updateHelp(side) {
  const type = document.getElementById('type' + side).value;
  const el = document.getElementById('help' + side);
  const input = document.getElementById('code' + side);
  const info = _HELP_MAP[type];
  if (info) {
    el.innerHTML = `— <a href="${info.url}" target="_blank" rel="noopener">${info.doc} ↗</a>`;
    input.placeholder = info.example;
  }
}
// 初始化帮助链接
updateHelp('A');
updateHelp('B');

/* ════════════════════════════════════════════════
   9.2  Analysis request & status feedback
   ════════════════════════════════════════════════ */
async function runAnalysis() {
  const btn     = document.getElementById('analyzeBtn');
  const spinner = document.getElementById('spinner');
  const errEl   = document.getElementById('errorMsg');
  const results = document.getElementById('results');

  btn.disabled = true;
  spinner.classList.add('show');
  errEl.classList.remove('show');
  results.classList.remove('show');

  const body = {
    contract_a: {
      code: document.getElementById('codeA').value.trim(),
      contract_type: document.getElementById('typeA').value,
      weight: parseFloat(document.getElementById('weightA').value) || 1.0
    },
    contract_b: {
      code: document.getElementById('codeB').value.trim(),
      contract_type: document.getElementById('typeB').value,
      weight: parseFloat(document.getElementById('weightB').value) || 1.0
    },
    years: parseInt(document.getElementById('yearsSelect').value) || 3
  };

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);

  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!resp.ok) {
      let detail = '分析过程中发生错误';
      try {
        const err = await resp.json();
        detail = err.detail || err.error || detail;
      } catch (_) {}
      throw new Error(detail);
    }

    const data = await resp.json();
    results.classList.add('show');
    // 先让容器可见，再渲染图表（ECharts 需要可见容器才能获取正确宽高）
    requestAnimationFrame(() => {
      renderResults(data);
      chartInstances.forEach(c => c.resize());
    });
  } catch (e) {
    errEl.textContent = e.name === 'AbortError'
      ? '请求超时，数据获取可能较慢，请稍后重试'
      : e.message || '网络连接失败，请检查网络后重试';
    errEl.classList.add('show');
  } finally {
    spinner.classList.remove('show');
    validateForm();
  }
}

/* ════════════════════════════════════════════════
   Helpers
   ════════════════════════════════════════════════ */
function fmt(v, d=2) {
  if (v == null || isNaN(v)) return '-';
  return Number(v).toFixed(d);
}
function pctClass(v) { return v > 0 ? 'val-pos' : v < 0 ? 'val-neg' : ''; }
function pctHtml(v, d=2) {
  const s = fmt(v, d);
  return `<span class="${pctClass(v)}">${s}%</span>`;
}

/* ════════════════════════════════════════════════
   9.3  Text report rendering
   ════════════════════════════════════════════════ */
function renderResults(d) {
  renderBasicInfo(d);
  renderAnnualReturns(d);
  renderVolatility(d);
  renderDrawdown(d);
  renderCorrelation(d);
  renderTrend(d);
  renderVolumeTrend(d);
  renderRatioSpread(d);
  renderMonthlyReturn(d);
  renderAllCharts(d);
}

function renderBasicInfo(d) {
  const a = d.basic_info_a, b = d.basic_info_b;
  const na = d.contract_a_name, nb = d.contract_b_name;
  document.getElementById('basicInfoCard').innerHTML = `
    <h2>基本行情概览</h2>
    <table>
      <tr><th>指标</th><th>${na}</th><th>${nb}</th></tr>
      <tr><td>数据区间</td><td>${a.date_range[0]} ~ ${a.date_range[1]}</td><td>${b.date_range[0]} ~ ${b.date_range[1]}</td></tr>
      <tr><td>起始价</td><td>${fmt(a.start_price, 4)}</td><td>${fmt(b.start_price, 4)}</td></tr>
      <tr><td>最新价</td><td>${fmt(a.latest_price, 4)}</td><td>${fmt(b.latest_price, 4)}</td></tr>
      <tr><td>区间涨跌幅</td><td>${pctHtml(a.change_pct)}</td><td>${pctHtml(b.change_pct)}</td></tr>
      <tr><td>最高价</td><td>${fmt(a.high, 4)}</td><td>${fmt(b.high, 4)}</td></tr>
      <tr><td>最低价</td><td>${fmt(a.low, 4)}</td><td>${fmt(b.low, 4)}</td></tr>
      <tr><td>日均成交量</td><td>${fmt(a.avg_volume, 0)}</td><td>${fmt(b.avg_volume, 0)}</td></tr>
      <tr><td>日均成交额</td><td>${a.avg_amount != null ? fmt(a.avg_amount, 0) : '-'}</td><td>${b.avg_amount != null ? fmt(b.avg_amount, 0) : '-'}</td></tr>
    </table>`;
}

function renderAnnualReturns(d) {
  const na = d.contract_a_name, nb = d.contract_b_name;
  let rows = d.annual_returns.map(r =>
    `<tr><td>${r.year}</td><td>${pctHtml(r.return_a)}</td><td>${pctHtml(r.return_b)}</td></tr>`
  ).join('');
  document.getElementById('annualReturnCard').innerHTML = `
    <h2>年度收益率对比</h2>
    <table><tr><th>年度</th><th>${na}</th><th>${nb}</th></tr>${rows}</table>`;
}

function renderVolatility(d) {
  const a = d.volatility_a, b = d.volatility_b;
  const na = d.contract_a_name, nb = d.contract_b_name;
  document.getElementById('volatilityCard').innerHTML = `
    <h2>波动率分析</h2>
    <table>
      <tr><th>指标</th><th>${na}</th><th>${nb}</th></tr>
      <tr><td>年化波动率</td><td>${fmt(a.annualized_vol)}%</td><td>${fmt(b.annualized_vol)}%</td></tr>
      <tr><td>日收益率均值</td><td>${fmt(a.daily_return_mean, 4)}%</td><td>${fmt(b.daily_return_mean, 4)}%</td></tr>
      <tr><td>日收益率标准差</td><td>${fmt(a.daily_return_std, 4)}%</td><td>${fmt(b.daily_return_std, 4)}%</td></tr>
    </table>`;
}

function renderDrawdown(d) {
  const a = d.drawdown_a, b = d.drawdown_b;
  const na = d.contract_a_name, nb = d.contract_b_name;
  document.getElementById('drawdownCard').innerHTML = `
    <h2>最大回撤分析</h2>
    <table>
      <tr><th>指标</th><th>${na}</th><th>${nb}</th></tr>
      <tr><td>最大回撤</td><td>${pctHtml(a.max_drawdown_pct)}</td><td>${pctHtml(b.max_drawdown_pct)}</td></tr>
      <tr><td>高点日期</td><td>${a.peak_date}</td><td>${b.peak_date}</td></tr>
      <tr><td>高点价格</td><td>${fmt(a.peak_price, 4)}</td><td>${fmt(b.peak_price, 4)}</td></tr>
      <tr><td>低点日期</td><td>${a.trough_date}</td><td>${b.trough_date}</td></tr>
      <tr><td>低点价格</td><td>${fmt(a.trough_price, 4)}</td><td>${fmt(b.trough_price, 4)}</td></tr>
    </table>`;
}

function renderCorrelation(d) {
  const c = d.correlation;
  document.getElementById('correlationCard').innerHTML = `
    <h2>相关性分析</h2>
    <div class="info-grid">
      <div class="info-item"><span class="label">重叠交易日：</span><span class="value">${c.overlap_days} 天</span></div>
      <div class="info-item"><span class="label">价格相关系数：</span><span class="value">${fmt(c.price_corr, 4)}</span></div>
      <div class="info-item"><span class="label">收益率相关系数：</span><span class="value">${fmt(c.return_corr, 4)}</span></div>
      <div class="info-item"><span class="label">滚动相关性均值：</span><span class="value">${fmt(c.rolling_corr_mean, 4)}</span></div>
      <div class="info-item"><span class="label">滚动相关性最小值：</span><span class="value">${fmt(c.rolling_corr_min, 4)}</span></div>
      <div class="info-item"><span class="label">滚动相关性最大值：</span><span class="value">${fmt(c.rolling_corr_max, 4)}</span></div>
    </div>`;
}

function renderTrend(d) {
  const a = d.trend_a, b = d.trend_b;
  const na = d.contract_a_name, nb = d.contract_b_name;
  const maKeys = ['MA5','MA20','MA60','MA120'];
  const chgKeys = ['5d','20d','60d'];
  document.getElementById('trendCard').innerHTML = `
    <h2>近期趋势与均线状态</h2>
    <h3>近期涨跌幅</h3>
    <table>
      <tr><th>周期</th><th>${na}</th><th>${nb}</th></tr>
      ${chgKeys.map(k => `<tr><td>${k}</td><td>${pctHtml(a.recent_changes[k])}</td><td>${pctHtml(b.recent_changes[k])}</td></tr>`).join('')}
    </table>
    <h3>均线值</h3>
    <table>
      <tr><th>均线</th><th>${na}</th><th>${nb}</th></tr>
      ${maKeys.map(k => `<tr><td>${k}</td><td>${fmt(a.ma_values[k], 4)}</td><td>${fmt(b.ma_values[k], 4)}</td></tr>`).join('')}
    </table>
    <div class="info-grid" style="margin-top:10px;">
      <div class="info-item"><span class="label">${na} 趋势状态：</span><span class="value">${a.trend_status}</span></div>
      <div class="info-item"><span class="label">${nb} 趋势状态：</span><span class="value">${b.trend_status}</span></div>
    </div>`;
}

function renderVolumeTrend(d) {
  const a = d.volume_trend_a, b = d.volume_trend_b;
  const na = d.contract_a_name, nb = d.contract_b_name;
  document.getElementById('volumeTrendCard').innerHTML = `
    <h2>成交量趋势</h2>
    <table>
      <tr><th>指标</th><th>${na}</th><th>${nb}</th></tr>
      <tr><td>近3月月均成交量</td><td>${fmt(a.recent_3m_avg, 0)}</td><td>${fmt(b.recent_3m_avg, 0)}</td></tr>

/* ════════════════════════════════════════════════
   9.4  ECharts interactive charts
   ════════════════════════════════════════════════ */
const chartInstances = [];
function initChart(id) {
  const el = document.getElementById(id);
  const c = echarts.init(el);
  chartInstances.push(c);
  return c;
}
window.addEventListener('resize', () => chartInstances.forEach(c => c.resize()));

function baseOption() {
  return {
    tooltip: { trigger: 'axis', confine: true },
    grid: { left: 15, right: 15, top: 50, bottom: 70, containLabel: true },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      { type: 'slider', start: 0, end: 100, height: 22, bottom: 6 }
    ]
  };
}

/* 通用 xAxis 配置（日期型） */
function dateXAxis(dates) {
  return {
    type: 'category',
    data: dates,
    boundaryGap: false,
    axisLabel: { fontSize: 10, rotate: 30, interval: Math.max(Math.floor(dates.length / 8), 0) }
  };
}
/* 通用 xAxis 配置（类目型，如月份） */
function catXAxis(labels) {
  return {
    type: 'category',
    data: labels,
    axisLabel: { fontSize: 10, rotate: 45, interval: Math.max(Math.floor(labels.length / 12), 0) }
  };
}

function renderAllCharts(d) {
  chartInstances.forEach(c => c.dispose());
  chartInstances.length = 0;
  const cd = d.charts_data;

  // 1. Contract A price + MA
  renderPriceChart('chartPriceA', d.contract_a_name, cd.dates_a, cd.prices_a, cd.ma20_a, cd.ma60_a);
  // 2. Contract B price + MA
  renderPriceChart('chartPriceB', d.contract_b_name, cd.dates_b, cd.prices_b, cd.ma20_b, cd.ma60_b);
  // 3. Price ratio
  renderLineWithMean('chartRatio', '价比', cd.overlap_dates, cd.price_ratio, cd.ratio_mean, '#4a6cf7');
  // 4. Price spread
  renderLineWithMean('chartSpread', '价差', cd.overlap_dates, cd.price_spread, cd.spread_mean, '#e67e22');
  // 5. Normalized price comparison
  renderNormChart(d, cd);
  // 6. Rolling correlation
  renderRollingCorr(cd);
  // 7. Monthly returns bar
  renderMonthlyBar(d, cd);
  // 8. Monthly returns distribution
  renderDistChart(d, cd);
}

function renderPriceChart(id, name, dates, prices, ma20, ma60) {
  const c = initChart(id);
  const opt = {
    ...baseOption(),
    legend: { data: ['收盘价', 'MA20', 'MA60'], top: 4 },
    xAxis: dateXAxis(dates),
    yAxis: { type: 'value', scale: true },
    series: [
      { name: '收盘价', type: 'line', data: prices, showSymbol: false, lineStyle: { width: 1.5 }, itemStyle: { color: '#4a6cf7' } },
      { name: 'MA20', type: 'line', data: ma20, showSymbol: false, lineStyle: { width: 1, type: 'dashed' }, itemStyle: { color: '#e67e22' } },
      { name: 'MA60', type: 'line', data: ma60, showSymbol: false, lineStyle: { width: 1, type: 'dashed' }, itemStyle: { color: '#e53e3e' } }
    ]
  };
  c.setOption(opt);
}

function renderLineWithMean(id, label, dates, values, mean, color) {
  const c = initChart(id);
  const opt = {
    ...baseOption(),
    legend: { data: [label, '均值'], top: 4 },
    xAxis: dateXAxis(dates),
    yAxis: { type: 'value', scale: true },
    series: [
      { name: label, type: 'line', data: values, showSymbol: false, lineStyle: { width: 1.5 }, itemStyle: { color } },
      { name: '均值', type: 'line', data: dates.map(() => mean), showSymbol: false, lineStyle: { width: 1, type: 'dashed', color: '#e53e3e' }, itemStyle: { color: '#e53e3e' } }
    ]
  };
  c.setOption(opt);
}

function renderNormChart(d, cd) {
  const c = initChart('chartNorm');
  const opt = {
    ...baseOption(),
    legend: { data: [d.contract_a_name, d.contract_b_name], top: 4 },
    xAxis: dateXAxis(cd.overlap_dates),
    yAxis: { type: 'value', scale: true },
    series: [
      { name: d.contract_a_name, type: 'line', data: cd.norm_prices_a, showSymbol: false, lineStyle: { width: 1.5 }, itemStyle: { color: '#4a6cf7' } },
      { name: d.contract_b_name, type: 'line', data: cd.norm_prices_b, showSymbol: false, lineStyle: { width: 1.5 }, itemStyle: { color: '#e67e22' } }
    ]
  };
  c.setOption(opt);
}

function renderRollingCorr(cd) {
  const c = initChart('chartCorr');
  const opt = {
    ...baseOption(),
    legend: { data: ['滚动相关性', '均值'], top: 4 },
    xAxis: dateXAxis(cd.overlap_dates),
    yAxis: { type: 'value', scale: true, min: -1, max: 1 },
    series: [
      { name: '滚动相关性', type: 'line', data: cd.rolling_corr, showSymbol: false, lineStyle: { width: 1.5 }, itemStyle: { color: '#6366f1' }, connectNulls: false },
      { name: '均值', type: 'line', data: cd.overlap_dates.map(() => cd.rolling_corr_mean), showSymbol: false, lineStyle: { width: 1, type: 'dashed', color: '#e53e3e' }, itemStyle: { color: '#e53e3e' } }
    ]
  };
  c.setOption(opt);
}

function renderMonthlyBar(d, cd) {
  const c = initChart('chartMonthly');
  const opt = {
    ...baseOption(),
    legend: { data: [d.contract_a_name, d.contract_b_name], top: 4 },
    xAxis: catXAxis(cd.months),
    yAxis: { type: 'value', axisLabel: { formatter: '{value}%' } },
    series: [
      { name: d.contract_a_name, type: 'bar', data: cd.monthly_returns_a, itemStyle: { color: '#4a6cf7' } },
      { name: d.contract_b_name, type: 'bar', data: cd.monthly_returns_b, itemStyle: { color: '#e67e22' } }
    ]
  };
  c.setOption(opt);
}

function renderDistChart(d, cd) {
  const c = initChart('chartDist');
  // Build histogram bins
  const allVals = [...cd.monthly_returns_a, ...cd.monthly_returns_b].filter(v => v != null);
  if (allVals.length === 0) return;
  const lo = Math.floor(Math.min(...allVals));
  const hi = Math.ceil(Math.max(...allVals));
  const binCount = Math.max(Math.min(20, hi - lo), 5);
  const binWidth = (hi - lo) / binCount || 1;
  const bins = Array.from({ length: binCount }, (_, i) => lo + i * binWidth);
  const labels = bins.map(b => fmt(b, 1) + '%');

  function histogram(vals) {
    const counts = new Array(binCount).fill(0);
    vals.forEach(v => {
      if (v == null) return;
      let idx = Math.floor((v - lo) / binWidth);
      if (idx >= binCount) idx = binCount - 1;
      if (idx < 0) idx = 0;
      counts[idx]++;
    });
    return counts;
  }

  const histA = histogram(cd.monthly_returns_a);
  const histB = histogram(cd.monthly_returns_b);
  const meanA = cd.monthly_returns_a.reduce((s, v) => s + v, 0) / cd.monthly_returns_a.length;
  const meanB = cd.monthly_returns_b.reduce((s, v) => s + v, 0) / cd.monthly_returns_b.length;

  const opt = {
    ...baseOption(),
    legend: { data: [d.contract_a_name, d.contract_b_name, d.contract_a_name + ' 均值', d.contract_b_name + ' 均值'], top: 4 },
    xAxis: catXAxis(labels),
    yAxis: { type: 'value', name: '月数' },
    series: [
      { name: d.contract_a_name, type: 'bar', data: histA, itemStyle: { color: 'rgba(74,108,247,0.7)' }, barGap: '10%' },
      { name: d.contract_b_name, type: 'bar', data: histB, itemStyle: { color: 'rgba(230,126,34,0.7)' } },
      { name: d.contract_a_name + ' 均值', type: 'line', markLine: { silent: true, symbol: 'none', data: [{ xAxis: findBinLabel(meanA, lo, binWidth, binCount, labels) }], lineStyle: { color: '#4a6cf7', type: 'dashed', width: 2 }, label: { formatter: fmt(meanA, 2) + '%' } }, data: [] },
      { name: d.contract_b_name + ' 均值', type: 'line', markLine: { silent: true, symbol: 'none', data: [{ xAxis: findBinLabel(meanB, lo, binWidth, binCount, labels) }], lineStyle: { color: '#e67e22', type: 'dashed', width: 2 }, label: { formatter: fmt(meanB, 2) + '%' } }, data: [] }
    ]
  };
  c.setOption(opt);
}

function findBinLabel(val, lo, binWidth, binCount, labels) {
  let idx = Math.floor((val - lo) / binWidth);
  if (idx >= binCount) idx = binCount - 1;
  if (idx < 0) idx = 0;
  return labels[idx];
}
